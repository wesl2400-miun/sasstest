# Bygger projektet med hjälp av Vite och publicerar det till GithubPages.
name: Deploy static content to Pages

on:
  push:
  # Bygg projektet från denna gren.
    branches: ['master'] 

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Ta bort cache
      - name: Cleanup
        run: |
          echo "Fetching list of cache keys"
          cacheKeysForPR=$(gh cache list --ref $BRANCH --limit 100 --json id --jq '.[].id')

          ## Setting this to not fail the workflow while deleting cache keys.
          set +e
          echo "Deleting caches..."
          for cacheKey in $cacheKeysForPR
          do
              gh cache delete $cacheKey
          done
          echo "Done"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
      # Installerar beroenden från package-lock.json
        run: npm ci
      - name: Build
      # Bygg projektet med Vite och lägg till '/sasstest/' till bas-URL:en
      # Detta är superviktigt - annars hittas inte projektfilerna
        run: npm run build -- --base /sasstest/ 
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
      # Den färdiga appen uppladdas från './dist'-mappen. 
      # I dist-mappen hamnar den optimerade och produktionsfärdiga 
      # versionen av appen som skapas av Vite.
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4